name: Publish to Verdaccio
on:
  push:
    branches: ["main"]   # adjust to whatever branch you cut releases from
    paths: ["**"]
jobs:
  publish-npm:
    name: publish to npm.ugavel.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
          registry-url: http://npm.ugavel.com/
      - name: publish if the version is new
        # Publish only when package.json's version isn't already on the registry, so docs /
        # maintenance pushes to main don't fail (npm refuses to overwrite) or spuriously republish.
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "com.unity.webrtc@$VER" version >/dev/null 2>&1; then
            echo "com.unity.webrtc@$VER is already on npm.ugavel.com — skipping publish."
          else
            echo "Publishing com.unity.webrtc@$VER"
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{secrets.VERDACCIO_TOKEN}}
